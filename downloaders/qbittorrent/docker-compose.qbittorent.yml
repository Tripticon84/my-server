services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add: [NET_ADMIN]
    environment:
      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES} # IP WireGuard assignée par AirVPN
      - SERVER_COUNTRIES=Netherlands
      - FIREWALL_VPN_INPUT_PORTS=${PORT_QBITTORRENT_TORRENTING} # Port torrenting
      - TZ=${TIMEZONE}
    ports:
      - ${PORT_QBITTORRENT_WEB}:${PORT_QBITTORRENT_WEB}
      - ${PORT_QBITTORRENT_TORRENTING}:${PORT_QBITTORRENT_TORRENTING}/tcp
      - ${PORT_QBITTORRENT_TORRENTING}:${PORT_QBITTORRENT_TORRENTING}/udp
    networks:
      - srv
    restart: unless-stopped

  qbittorrent:
    container_name: qbittorrent
    image: linuxserver/qbittorrent:${QBITTORRENT_VERSION}
    network_mode: "service:gluetun"
    environment:
      - PUID=2301
      - PGID=2001
      - TZ=${TIMEZONE}
      - WEBUI_PORT=${PORT_QBITTORRENT_WEB}
      - TORRENTING_PORT=${PORT_QBITTORRENT_TORRENTING}
      - FIREWALL_VPN_INPUT_PORTS=${PORT_QBITTORRENT_TORRENTING}
      - VPN_PORT_FORWARDING=true
    volumes:
      - /homelab/servarr/qbitorrent/config:/config
      - /data/downloads:/downloads
    restart: unless-stopped
    depends_on:
      - gluetun
    deploy:
      resources:
        limits:
          memory: 5G

networks:
  srv:
    external: true
