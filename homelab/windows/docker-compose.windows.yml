services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "11"
      DISK_SIZE: "80G"
      LANGUAGE: "French"
      USERNAME: "Yann"
      PASSWORD: "yann"
      REGION: "fr-FR"
      KEYBOARD: "fr-FR"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - /homelab/windows:/storage
    restart: always
    stop_grace_period: 2m